name: Build DroidStar Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Qt 6.5.0
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: qtmultimedia qtserialport qt5compat

      - name: Configurar CMake
        shell: cmd
        run: |
          if exist build rmdir /S /Q build
          mkdir build
          cd build
          cmake .. ^
            -G "MinGW Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Compilar
        shell: cmd
        run: |
          cd build
          mingw32-make -j4

      - name: Empaquetar dependencias Qt
        shell: cmd
        run: |
          windeployqt --release build\DroidStar.exe

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: DroidStar-Windows
          path: build
